name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            task: lint
          - name: Typecheck
            task: typecheck
          - name: Build
            task: build

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Install the locked toolchain
        uses: jdx/mise-action@v4
        with:
          cache: true
          install: true
          version: 2026.6.14

      - name: Locate the Yarn package cache
        id: yarn-cache
        run: echo "directory=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Restore the Yarn package cache
        uses: actions/cache@v6
        with:
          path: ${{ steps.yarn-cache.outputs.directory }}
          key: yarn-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.lock', 'yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-${{ runner.arch }}-

      - name: Run mise task
        run: mise run ${{ matrix.task }}
