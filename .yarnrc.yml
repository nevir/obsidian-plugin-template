approvedGitRepositories: []

enableScripts: false

nodeLinker: node-modules

npmMinimalAgeGate: 1d

# Keep version intent reviewable in pull requests; CI applies it after merge.
preferDeferredVersions: true

# Repair two missing internal Parcel edges without hiding other peer warnings.
packageExtensions:
  "@parcel/node-resolver-core@3.7.4":
    dependencies:
      "@parcel/core": "2.16.4"
  "@parcel/types@2.16.4":
    dependencies:
      "@parcel/core": "2.16.4"
